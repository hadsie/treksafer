# Tunable thresholds governing what fire responses include. Structural
# configuration (data sources, transports, paths) stays in config.yaml.
# Values support the same ${VAR:-default} placeholder syntax.

# Hard ceiling on messages sent for one reply: a bug detector, never
# policy. Any legitimate reply is far below it; if it ever fires, the
# assembler produced a runaway reply and the error log says so. Set it
# well above the content budget so the two never compete.
sms_segment_backstop: ${TREKSAFER_SMS_SEGMENT_BACKSTOP:-15}

# The wind line appears when sustained speed reaches this floor (km/h).
wind_floor: ${TREKSAFER_WIND_FLOOR:-20}

# Minimum rise (km/h) from current speed to the forecast peak before the
# "rising to" form appears.
wind_trend_delta: ${TREKSAFER_WIND_TREND_DELTA:-10}

# How far ahead (hours) the wind forecast peak looks.
wind_forecast_hours: ${TREKSAFER_WIND_FORECAST_HOURS:-12}

# The AQI line appears when the current value reaches this floor. 75 sits
# late in the Moderate band, so rising smoke shows before it crosses into
# unhealthy-for-sensitive-groups at 101.
aqi_floor: ${TREKSAFER_AQI_FLOOR:-75}

# How far ahead (hours) the AQI forecast peak looks.
aqi_forecast_hours: ${TREKSAFER_AQI_FORECAST_HOURS:-4}

# The AQI line also appears, in its "rising to" form, when the forecast
# peak exceeds the current value by this much within the window: smoke
# arriving fast matters even while the current reading is clean.
aqi_trend_delta: ${TREKSAFER_AQI_TREND_DELTA:-50}
