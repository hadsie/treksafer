# Config for TrekSafer

# Maximum radius a user can specify (km).
max_radius: 150

# The radius to search for fires within (km).
fire_radius: 50

# The default fire status filter level (active, controlled, all).
# controlled: includes active, managed, and controlled fires (excludes out)
# active: only active fires
# all/out: all fires including out fires
fire_status: "controlled"

# Minimum fire size to include (hectares).
fire_size: 1

# Fires discovered within this many days bypass the minimum size filter.
new_fire_age_days: 7

# Auto-detected requests default to fire data within this window (MM-DD, inclusive).
fire_season_start: "05-15"
fire_season_end: "08-15"

# The amount of time to wait for a download before giving up, in seconds.
download_timeout: 600

# Avalanche forecast settings
avalanche_distance_buffer: 5  # Distance buffer for avalanche provider selection (km)

# Include the AQI at the specified coordinates in the response.
include_aqi: true

# Path to shapefiles
shapefiles: "${TREKSAFER_SHAPEFILES:-shapefiles}"

# Logging
log_file: "logs/${TREKSAFER_ENV}.log"
# logging.INFO
log_level: 20

transports:
  - type: "signalwire"
    enabled: ${TREKSAFER_SW_ENABLED:-false}
    project_id: ${TREKSAFER_SW_PROJECT}
    api_token : ${TREKSAFER_SW_TOKEN}
    phone_number: "${TREKSAFER_SW_NUMBER}"
    context: ${TREKSAFER_SW_CONTEXT:-treksafer}
  - type: "cli"
    enabled: ${TREKSAFER_CLI_ENABLED:-true}
    host: ${TREKSAFER_CLI_HOST:-localhost}
    port: "${TREKSAFER_CLI_PORT:-8888}"

# Data files, located at {shapefiles}/{location}/{filename}.
data:
  - location: AB
    filename: AB_Fire_Perimeters_{DATE}.zip
    # Realtime Alberta Wildfire ArcGIS layers; the downloaded file below is
    # the fallback when the API is unavailable. The points layer holds active
    # fires only, matching the active-perimeters download (out: []).
    realtime:
      enabled: ${TREKSAFER_AB_REALTIME:-true}
      points_url: https://services.arcgis.com/Eb8P5h4CJk8utIBz/arcgis/rest/services/Active_Wildfires_(PROD)/FeatureServer/0/query
      perimeters_url: https://services.arcgis.com/Eb8P5h4CJk8utIBz/arcgis/rest/services/Wildfire_Perimeter_Active_(PROD)/FeatureServer/3/query
      perimeter_fire_field: FireNumber
      cache_timeout: 900
      mapping:
        # LABEL ("HWF-096-2026") matches the perimeter layer's FireNumber
        # values and the fire-number format of the downloaded file; the
        # points layer's FIRE_NUMBER ("HWF096") matches neither.
        Fire: LABEL
        Location: FIRE_COMPLEX_NAME
        Size: AREA_ESTIMATE
        Status: FIRE_STATUS
        # Initial assessment date; the closest AB publishes to a discovery
        # date, so it drives the new-fire size exemption.
        Discovered: ASSESSMENT_ASSISTANCE_DATE
      transforms:
        Discovered: epoch_ms
      status_map:
        active: ['Out of Control']
        managed: ['Being Held']
        controlled: ['Under Control']
        out: []
    mapping:
      fields:
        Fire: FIRE_NUMBE
        Size: AREA
        Name: ALIAS
        Location: COMPLEX
        Status: STATUS
    status_map:
      active: ['Out of Control']
      managed: ['Being Held']
      controlled: ['Under Control']
      out: []
  - location: BC
    filename: BC_Fire_Perimeters_{DATE}.zip
    # Realtime BCWS ArcGIS layers; the downloaded file below is the fallback
    # when the API is unavailable.
    realtime:
      enabled: ${TREKSAFER_BC_REALTIME:-true}
      points_url: https://services6.arcgis.com/ubm4tcTYICKBpist/ArcGIS/rest/services/BCWS_ActiveFires_PublicView/FeatureServer/0/query
      perimeters_url: https://services6.arcgis.com/ubm4tcTYICKBpist/ArcGIS/rest/services/BCWS_FirePerimeters_PublicView/FeatureServer/0/query
      perimeter_fire_field: FIRE_NUMBER
      cache_timeout: 900
      mapping:
        Fire: FIRE_NUMBER
        Name: INCIDENT_NAME
        Location: GEOGRAPHIC_DESCRIPTION
        Size: CURRENT_SIZE
        Status: FIRE_STATUS
        Discovered: IGNITION_DATE
      transforms:
        Discovered: epoch_ms
      status_map:
        active: ['Out of Control', 'Fire of Note']
        managed: ['Being Held']
        controlled: ['Under Control']
        out: ['Out']
    mapping:
      fields:
        Fire: FIRE_NUM
        Size: FIRE_SZ_HA
      api:
        url: https://wildfiresituation-api.nrs.gov.bc.ca/publicPublishedIncident/{FIRE_NUM}?fireYear={FIRE_YEAR}
        fields:
          Name: incidentName
          Location: incidentLocation
          Status: stageOfControlCode
    status_map:
      active: ['OUT_CNTRL']
      managed: ['HOLDING']
      controlled: ['UNDR_CNTRL']
      out: ['OUT']
  - location: CA
    filename: CA_Fire_Perimeters_{DATE}.zip
    mapping:
      fields:
        Fire: firename
        Name: firename
        Location: agency
        Size: hectares
        Status: stage_of_c
    status_map:
      active: ['OC']
      managed: ['BH']
      controlled: ['UC']
      out: []
  - location: US
    filename: "WFIGS_Interagency_Perimeters_{DATE}.zip"
    mapping:
      fields:
        Fire: attr_FireCode
        Name: attr_IncidentName
        Location: attr_IncidentShortDescription
        Size: attr_IncidentSize
        Status: attr_PercentContained
      size_transform: acres_to_hectares
      status_transform: percent_contained
    # WFIGS has no stage-of-control field; status is derived from
    # attr_PercentContained via status_transform, so status_map is unused.
    status_map:
      active: []
      managed: []
      controlled: []
      out: []

avalanche:
  providers:
    AvalancheCanada:
      class: AvalancheCanadaProvider
      api_url: https://api.avalanche.ca/forecasts/{lang}/products/point
      cache_timeout: 3600
      language: en
      out_of_season: ["Spring Conditions", "Summer Conditions", "Early Season"]
    NationalAvalancheCenter:
      class: NationalAvalancheProvider
      api_url: https://api.avalanche.org/v2/public/product?type=forecast&center_id={center}&zone_id={zone}
      cache_timeout: 3600
      language: en
