# Config for TrekSafer

# Maximum radius a user can specify (km).
max_radius: 150

# The radius to search for fires within (km).
fire_radius: 50

# The default fire status filter level (active, controlled, all).
# controlled: includes active, managed, and controlled fires (excludes out)
# active: only active fires
# all/out: all fires including out fires
fire_status: "controlled"

# Minimum fire size to include (hectares).
fire_size: 1

# Fires discovered within this many days bypass the minimum size filter.
new_fire_age_days: 7

# Auto-detected requests default to fire data within this window (MM-DD, inclusive).
fire_season_start: "05-15"
fire_season_end: "08-15"

# Avalanche forecast settings
avalanche_distance_buffer: 5  # Distance buffer for avalanche provider selection (km)

# Include the AQI at the specified coordinates in the response.
include_aqi: true

# Fire database: snapshot history and the fallback for API outages.
database: "${TREKSAFER_DATABASE:-data/fires.db}"

# Logging
log_file: "logs/${TREKSAFER_ENV}.log"
# logging.INFO
log_level: 20

transports:
  - type: "signalwire"
    enabled: ${TREKSAFER_SW_ENABLED:-false}
    project_id: ${TREKSAFER_SW_PROJECT}
    api_token : ${TREKSAFER_SW_TOKEN}
    phone_number: "${TREKSAFER_SW_NUMBER}"
    context: ${TREKSAFER_SW_CONTEXT:-treksafer}
  - type: "cli"
    enabled: ${TREKSAFER_CLI_ENABLED:-true}
    host: ${TREKSAFER_CLI_HOST:-localhost}
    port: "${TREKSAFER_CLI_PORT:-8888}"

# Fire data sources. Each is a pair of realtime ArcGIS layers; every fetch
# is recorded to the fire database, which is also the fallback when an API
# is unavailable.
data:
  - location: AB
    # The points layer holds active fires only, matching out: []. LABEL
    # ("HWF-096-2026") matches the perimeter layer's FireNumber values;
    # FIRE_STATUS_DATE is a zoneless Mountain-time string.
    realtime:
      enabled: ${TREKSAFER_AB_REALTIME:-true}
      points_url: https://services.arcgis.com/Eb8P5h4CJk8utIBz/arcgis/rest/services/Active_Wildfires_(PROD)/FeatureServer/0/query
      perimeters_url: https://services.arcgis.com/Eb8P5h4CJk8utIBz/arcgis/rest/services/Wildfire_Perimeter_Active_(PROD)/FeatureServer/3/query
      join_field: LABEL
      perimeter_fire_field: FireNumber
      key_fields: [LABEL]
      updated_field: FIRE_STATUS_DATE
      timezone: America/Edmonton
      cache_timeout: 900
      mapping:
        Fire: LABEL
        Location: FIRE_COMPLEX_NAME
        Size: AREA_ESTIMATE
        Status: FIRE_STATUS
        Discovered: ASSESSMENT_ASSISTANCE_DATE
      transforms:
        Discovered: epoch_ms
      status_map:
        active: ['Out of Control']
        managed: ['Being Held']
        controlled: ['Under Control']
        out: []
  - location: BC
    # BC fire numbers recycle annually, so the database key includes the year.
    realtime:
      enabled: ${TREKSAFER_BC_REALTIME:-true}
      points_url: https://services6.arcgis.com/ubm4tcTYICKBpist/ArcGIS/rest/services/BCWS_ActiveFires_PublicView/FeatureServer/0/query
      perimeters_url: https://services6.arcgis.com/ubm4tcTYICKBpist/ArcGIS/rest/services/BCWS_FirePerimeters_PublicView/FeatureServer/0/query
      join_field: FIRE_NUMBER
      perimeter_fire_field: FIRE_NUMBER
      key_fields: [FIRE_YEAR, FIRE_NUMBER]
      cache_timeout: 900
      mapping:
        Fire: FIRE_NUMBER
        Name: INCIDENT_NAME
        Location: GEOGRAPHIC_DESCRIPTION
        Size: CURRENT_SIZE
        Status: FIRE_STATUS
        Discovered: IGNITION_DATE
      transforms:
        Discovered: epoch_ms
      status_map:
        active: ['Out of Control', 'Fire of Note']
        managed: ['Being Held']
        controlled: ['Under Control']
        out: ['Out']
  - location: CA
    # National CWFIS layers (via Esri Canada). BC and AB are excluded; they
    # have dedicated sources. The hotspot perimeters carry no fire ID, so
    # points join to polygons by location; fires with no polygon get a
    # circle of their reported size.
    realtime:
      enabled: ${TREKSAFER_CA_REALTIME:-true}
      points_url: https://services.arcgis.com/wjcPoefzjpzCgffS/arcgis/rest/services/activefires/FeatureServer/0/query
      perimeters_url: https://services.arcgis.com/wjcPoefzjpzCgffS/arcgis/rest/services/Active_Wildfire_Perimeters_in_Canada/FeatureServer/0/query
      join: spatial
      points_where: Agency NOT IN ('BC','AB')
      # Composite values like Manitoba/Saskatchewan survive NOT IN, so a
      # border-straddling patch whose fire we do cover still comes through.
      perimeters_where: Province NOT IN ('British Columbia','Alberta')
      key_fields: [Fire_Name]
      cache_timeout: 900
      mapping:
        Fire: Fire_Name
        Location: Agency
        Size: Hectares__Ha_
        Status: Stage_of_Control
        Discovered: Start_Date
      transforms:
        Discovered: epoch_ms
      status_map:
        active: ['OC']
        managed: ['BH']
        controlled: ['UC']
        out: []
  - location: US
    # NIFC WFIGS layers. IrwinID (a GUID) is the stable join and identity
    # key; IncidentName is the displayed identifier. Status derives from
    # percent contained via wfigs_status, with prescribed burns (RX) shown
    # as "Prescribed", so status_map is unused.
    realtime:
      enabled: ${TREKSAFER_US_REALTIME:-true}
      points_url: https://services3.arcgis.com/T4QMspbfLg3qTGWY/arcgis/rest/services/WFIGS_Incident_Locations_Current/FeatureServer/0/query
      perimeters_url: https://services3.arcgis.com/T4QMspbfLg3qTGWY/arcgis/rest/services/WFIGS_Interagency_Perimeters_Current/FeatureServer/0/query
      join_field: IrwinID
      perimeter_fire_field: attr_IrwinID
      key_fields: [IrwinID]
      updated_field: ModifiedOnDateTime_dt
      cache_timeout: 900
      mapping:
        Fire: IncidentName
        Location: IncidentShortDescription
        Size: IncidentSize
        Status: PercentContained
        Type: IncidentTypeCategory
        Discovered: FireDiscoveryDateTime
      transforms:
        Size: acres_to_hectares
        Status: wfigs_status
        Discovered: epoch_ms
      status_map:
        active: []
        managed: []
        controlled: []
        out: []

avalanche:
  providers:
    AvalancheCanada:
      class: AvalancheCanadaProvider
      api_url: https://api.avalanche.ca/forecasts/{lang}/products/point
      cache_timeout: 3600
      language: en
      out_of_season: ["Spring Conditions", "Summer Conditions", "Early Season"]
    NationalAvalancheCenter:
      class: NationalAvalancheProvider
      api_url: https://api.avalanche.org/v2/public/product?type=forecast&center_id={center}&zone_id={zone}
      cache_timeout: 3600
      language: en
